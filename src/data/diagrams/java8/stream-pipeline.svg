<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">

  <!-- Background -->
  <rect width="860" height="500" fill="#0d0d0f" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#e4e4f0">Stream API — Pipeline &amp; Operations</text>

  <!-- ── PIPELINE ROW ── -->
  <!-- Source box -->
  <rect x="30" y="60" width="140" height="70" rx="8" fill="#131316" stroke="#7c6af7" stroke-width="1.5"/>
  <text x="100" y="83" text-anchor="middle" font-size="11" font-weight="700" fill="#7c6af7">SOURCE</text>
  <text x="100" y="100" text-anchor="middle" font-size="10" fill="#8a8a9a">list.stream()</text>
  <text x="100" y="115" text-anchor="middle" font-size="10" fill="#8a8a9a">Arrays.stream()</text>
  <text x="100" y="130" text-anchor="middle" font-size="10" fill="#5a5a6a">Stream.of()</text>

  <!-- Arrow -->
  <line x1="170" y1="95" x2="200" y2="95" stroke="#36363f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Intermediate box -->
  <rect x="200" y="60" width="430" height="70" rx="8" fill="#131316" stroke="#2dd4aa" stroke-width="1.5"/>
  <text x="415" y="83" text-anchor="middle" font-size="11" font-weight="700" fill="#2dd4aa">INTERMEDIATE OPERATIONS — lazy, return Stream</text>
  <text x="250" y="103" font-size="10" fill="#8a8a9a">filter()</text>
  <text x="310" y="103" font-size="10" fill="#8a8a9a">map()</text>
  <text x="360" y="103" font-size="10" fill="#8a8a9a">flatMap()</text>
  <text x="430" y="103" font-size="10" fill="#8a8a9a">distinct()</text>
  <text x="510" y="103" font-size="10" fill="#8a8a9a">sorted()</text>
  <text x="567" y="103" font-size="10" fill="#8a8a9a">limit()</text>
  <text x="613" y="103" font-size="10" fill="#8a8a9a">skip()</text>
  <text x="415" y="120" text-anchor="middle" font-size="9" fill="#36363f">Nothing executes until terminal is called</text>

  <!-- Arrow -->
  <line x1="630" y1="95" x2="660" y2="95" stroke="#36363f" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Terminal box -->
  <rect x="660" y="60" width="170" height="70" rx="8" fill="#131316" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="745" y="83" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">TERMINAL</text>
  <text x="680" y="100" font-size="10" fill="#8a8a9a">collect()</text>
  <text x="745" y="100" font-size="10" fill="#8a8a9a">forEach()</text>
  <text x="680" y="115" font-size="10" fill="#8a8a9a">reduce()</text>
  <text x="745" y="115" font-size="10" fill="#8a8a9a">count()</text>
  <text x="745" y="130" text-anchor="middle" font-size="9" fill="#f59e0b">triggers execution</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#36363f"/>
    </marker>
  </defs>

  <!-- ── SECTION: map vs flatMap ── -->
  <text x="30" y="165" font-size="12" font-weight="700" fill="#e4e4f0">map() vs flatMap()</text>
  <line x1="30" y1="170" x2="420" y2="170" stroke="#1a1a1f" stroke-width="1"/>

  <!-- map diagram -->
  <rect x="30" y="180" width="185" height="130" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>
  <text x="122" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#2dd4aa">map()</text>
  <text x="122" y="216" text-anchor="middle" font-size="9" fill="#5a5a6a">1-to-1 transform</text>

  <!-- map visual -->
  <rect x="45" y="225" width="50" height="20" rx="3" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1"/>
  <text x="70" y="239" text-anchor="middle" font-size="9" fill="#7c6af7">"hello"</text>
  <text x="102" y="239" font-size="10" fill="#36363f">→</text>
  <rect x="115" y="225" width="50" height="20" rx="3" fill="#1a2e1a" stroke="#2dd4aa" stroke-width="1"/>
  <text x="140" y="239" text-anchor="middle" font-size="9" fill="#2dd4aa">5</text>

  <rect x="45" y="253" width="50" height="20" rx="3" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1"/>
  <text x="70" y="267" text-anchor="middle" font-size="9" fill="#7c6af7">"world"</text>
  <text x="102" y="267" font-size="10" fill="#36363f">→</text>
  <rect x="115" y="253" width="50" height="20" rx="3" fill="#1a2e1a" stroke="#2dd4aa" stroke-width="1"/>
  <text x="140" y="267" text-anchor="middle" font-size="9" fill="#2dd4aa">5</text>

  <text x="122" y="295" text-anchor="middle" font-size="9" fill="#5a5a6a">.map(String::length)</text>
  <text x="122" y="308" text-anchor="middle" font-size="9" fill="#8a8a9a">Stream&lt;Integer&gt;</text>

  <!-- flatMap diagram -->
  <rect x="230" y="180" width="185" height="130" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>
  <text x="322" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#e879f9">flatMap()</text>
  <text x="322" y="216" text-anchor="middle" font-size="9" fill="#5a5a6a">1-to-many, then flatten</text>

  <!-- flatMap visual -->
  <rect x="245" y="225" width="60" height="20" rx="3" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1"/>
  <text x="275" y="239" text-anchor="middle" font-size="9" fill="#7c6af7">["a","b"]</text>

  <rect x="245" y="252" width="60" height="20" rx="3" fill="#1a1a2e" stroke="#7c6af7" stroke-width="1"/>
  <text x="275" y="266" text-anchor="middle" font-size="9" fill="#7c6af7">["c","d"]</text>

  <text x="312" y="245" font-size="10" fill="#36363f">→</text>
  <text x="312" y="265" font-size="10" fill="#36363f">→</text>

  <rect x="325" y="225" width="75" height="47" rx="3" fill="#2d1230" stroke="#e879f9" stroke-width="1"/>
  <text x="362" y="243" text-anchor="middle" font-size="9" fill="#e879f9">"a","b",</text>
  <text x="362" y="258" text-anchor="middle" font-size="9" fill="#e879f9">"c","d"</text>
  <text x="362" y="270" text-anchor="middle" font-size="8" fill="#5a5a6a">flattened</text>

  <text x="322" y="295" text-anchor="middle" font-size="9" fill="#5a5a6a">.flatMap(List::stream)</text>
  <text x="322" y="308" text-anchor="middle" font-size="9" fill="#8a8a9a">Stream&lt;String&gt;</text>

  <!-- ── SECTION: Collectors ── -->
  <text x="440" y="165" font-size="12" font-weight="700" fill="#e4e4f0">Key Collectors</text>
  <line x1="440" y1="170" x2="830" y2="170" stroke="#1a1a1f" stroke-width="1"/>

  <rect x="440" y="180" width="390" height="130" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>

  <text x="460" y="202" font-size="10" font-weight="600" fill="#f59e0b">Collector</text>
  <text x="600" y="202" font-size="10" font-weight="600" fill="#f59e0b">Output</text>
  <text x="720" y="202" font-size="10" font-weight="600" fill="#f59e0b">Use case</text>
  <line x1="450" y1="207" x2="820" y2="207" stroke="#1a1a1f" stroke-width="1"/>

  <text x="460" y="222" font-size="10" fill="#2dd4aa">toList()</text>
  <text x="600" y="222" font-size="10" fill="#8a8a9a">List&lt;T&gt;</text>
  <text x="720" y="222" font-size="10" fill="#8a8a9a">most common</text>

  <text x="460" y="238" font-size="10" fill="#2dd4aa">toSet()</text>
  <text x="600" y="238" font-size="10" fill="#8a8a9a">Set&lt;T&gt;</text>
  <text x="720" y="238" font-size="10" fill="#8a8a9a">deduplicate</text>

  <text x="460" y="254" font-size="10" fill="#2dd4aa">groupingBy(fn)</text>
  <text x="600" y="254" font-size="10" fill="#8a8a9a">Map&lt;K, List&lt;T&gt;&gt;</text>
  <text x="720" y="254" font-size="10" fill="#f59e0b">★ most asked</text>

  <text x="460" y="270" font-size="10" fill="#2dd4aa">partitioningBy(p)</text>
  <text x="600" y="270" font-size="10" fill="#8a8a9a">Map&lt;Boolean,List&lt;T&gt;&gt;</text>
  <text x="720" y="270" font-size="10" fill="#8a8a9a">split true/false</text>

  <text x="460" y="286" font-size="10" fill="#2dd4aa">joining(delim)</text>
  <text x="600" y="286" font-size="10" fill="#8a8a9a">String</text>
  <text x="720" y="286" font-size="10" fill="#8a8a9a">concat strings</text>

  <text x="460" y="302" font-size="10" fill="#2dd4aa">toMap(k, v)</text>
  <text x="600" y="302" font-size="10" fill="#8a8a9a">Map&lt;K, V&gt;</text>
  <text x="720" y="302" font-size="10" fill="#8a8a9a">custom key-value</text>

  <!-- ── SECTION: Key Rules ── -->
  <rect x="30" y="330" width="800" height="80" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>
  <text x="430" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#e4e4f0">Stream Rules — Must Remember</text>

  <rect x="50" y="360" width="130" height="36" rx="5" fill="#0d0d0f" stroke="#f26450" stroke-width="1"/>
  <text x="115" y="374" text-anchor="middle" font-size="9" fill="#f26450">Not a data structure</text>
  <text x="115" y="388" text-anchor="middle" font-size="9" fill="#8a8a9a">doesn't store data</text>

  <rect x="200" y="360" width="130" height="36" rx="5" fill="#0d0d0f" stroke="#f26450" stroke-width="1"/>
  <text x="265" y="374" text-anchor="middle" font-size="9" fill="#f26450">Doesn't modify source</text>
  <text x="265" y="388" text-anchor="middle" font-size="9" fill="#8a8a9a">creates new result</text>

  <rect x="350" y="360" width="130" height="36" rx="5" fill="#0d0d0f" stroke="#f26450" stroke-width="1"/>
  <text x="415" y="374" text-anchor="middle" font-size="9" fill="#f26450">Single-use</text>
  <text x="415" y="388" text-anchor="middle" font-size="9" fill="#8a8a9a">reuse → IllegalStateException</text>

  <rect x="500" y="360" width="130" height="36" rx="5" fill="#0d0d0f" stroke="#2dd4aa" stroke-width="1"/>
  <text x="565" y="374" text-anchor="middle" font-size="9" fill="#2dd4aa">Lazy evaluation</text>
  <text x="565" y="388" text-anchor="middle" font-size="9" fill="#8a8a9a">executes on terminal call</text>

  <rect x="650" y="360" width="160" height="36" rx="5" fill="#0d0d0f" stroke="#2dd4aa" stroke-width="1"/>
  <text x="730" y="374" text-anchor="middle" font-size="9" fill="#2dd4aa">Short-circuit</text>
  <text x="730" y="388" text-anchor="middle" font-size="9" fill="#8a8a9a">limit/findFirst stop early</text>

  <!-- ── SECTION: findFirst vs findAny ── -->
  <rect x="30" y="428" width="385" height="55" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>
  <text x="215" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#e4e4f0">findFirst() vs findAny()</text>
  <text x="50" y="464" font-size="10" fill="#2dd4aa">findFirst()</text>
  <text x="130" y="464" font-size="10" fill="#8a8a9a">first in encounter order — deterministic</text>
  <text x="50" y="478" font-size="10" fill="#f59e0b">findAny()</text>
  <text x="130" y="478" font-size="10" fill="#8a8a9a">any element — faster in parallel streams</text>

  <!-- ── SECTION: reduce ── -->
  <rect x="430" y="428" width="400" height="55" rx="8" fill="#131316" stroke="#1e1e26" stroke-width="1"/>
  <text x="630" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#e4e4f0">reduce()</text>
  <text x="450" y="464" font-size="10" fill="#2dd4aa">reduce(0, Integer::sum)</text>
  <text x="620" y="464" font-size="10" fill="#8a8a9a">→ T (with identity)</text>
  <text x="450" y="478" font-size="10" fill="#f59e0b">reduce(Integer::max)</text>
  <text x="620" y="478" font-size="10" fill="#8a8a9a">→ Optional&lt;T&gt; (no identity)</text>

</svg>