<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>hashCode() deep dive — what it returns and how bit spreading works</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section 1: What hashCode() returns -->
  <text x="340" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">What hashCode() returns</text>

  <!-- key box -->
  <g>
    <rect x="40" y="44" width="180" height="56" rx="8" stroke-width="0.5" fill="#1e1b3a" stroke="#534AB7"/>
    <text x="130" y="65" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">key</text>
    <text x="130" y="84" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">any Object</text>
  </g>
  <line x1="220" y1="72" x2="270" y2="72" stroke="#5a5a6a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- hashCode() box -->
  <g>
    <rect x="270" y="44" width="170" height="56" rx="8" stroke-width="0.5" fill="#0d2e26" stroke="#0F6E56"/>
    <text x="355" y="65" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#2dd4aa">hashCode()</text>
    <text x="355" y="84" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#1D9E75">native method</text>
  </g>
  <line x1="440" y1="72" x2="490" y2="72" stroke="#5a5a6a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- int (32-bit) box -->
  <g>
    <rect x="490" y="44" width="150" height="56" rx="8" stroke-width="0.5" fill="#2d1f06" stroke="#854F0B"/>
    <text x="565" y="65" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#f59e0b">int (32-bit)</text>
    <text x="565" y="84" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#BA7517">can be negative</text>
  </g>

  <!-- Info box -->
  <rect x="40" y="118" width="600" height="44" rx="8" stroke="#2a2a32" stroke-width="0.5" fill="#131316"/>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Returns a 32-bit signed integer — range: -2,147,483,648 to 2,147,483,647</text>
  <text x="340" y="153" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">HashMap uses this integer to decide which bucket the key goes into</text>

  <!-- Examples heading -->
  <text x="340" y="188" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">Examples</text>

  <!-- Example boxes -->
  <g>
    <rect x="40" y="200" width="185" height="56" rx="8" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="133" y="221" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#c4c4d0">"Pratik".hashCode()</text>
    <text x="133" y="240" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">→ some int e.g. 79553118</text>
  </g>
  <g>
    <rect x="248" y="200" width="185" height="56" rx="8" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="341" y="221" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#c4c4d0">Integer(42).hashCode()</text>
    <text x="341" y="240" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">→ 42 (same as value)</text>
  </g>
  <g>
    <rect x="456" y="200" width="184" height="56" rx="8" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="548" y="221" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#c4c4d0">new Object().hashCode()</text>
    <text x="548" y="240" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">→ memory address based</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="278" x2="640" y2="278" stroke="#1a1a1f" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Section 2: Why bit spreading -->
  <text x="340" y="304" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">Why bit spreading? The problem first</text>

  <!-- Problem box -->
  <g>
    <rect x="40" y="318" width="600" height="56" rx="8" stroke-width="0.5" fill="#2d1008" stroke="#993C1D"/>
    <text x="340" y="337" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#f26450">Problem: hashCode() high bits are ignored</text>
    <text x="340" y="356" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#D85A30">index = hash &amp; (n-1) only uses LOW bits → poor hashes cluster in same buckets</text>
  </g>

  <text x="340" y="398" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Two keys with different high bits but same low bits → same bucket (collision!)</text>

  <!-- Hash A box -->
  <g>
    <rect x="40" y="410" width="280" height="36" rx="6" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="180" y="432" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">hash A: 1010 1111 0000 0001</text>
  </g>
  <!-- Hash B box -->
  <g>
    <rect x="40" y="454" width="280" height="36" rx="6" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="180" y="476" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">hash B: 0101 0000 0000 0001</text>
  </g>
  <text x="180" y="510" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">Different! But &amp; (n-1) with n=16:</text>

  <!-- Collision result -->
  <g>
    <rect x="40" y="518" width="280" height="36" rx="6" stroke-width="0.5" fill="#2d1008" stroke="#993C1D"/>
    <text x="180" y="540" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#f26450">Both → bucket[1]  ← collision</text>
  </g>

  <!-- Solution arrow -->
  <line x1="340" y1="460" x2="390" y2="460" stroke="#5a5a6a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="398" y="452" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Solution:</text>
  <text x="398" y="468" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">spread high bits</text>
  <text x="398" y="484" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">into low bits</text>

  <!-- Divider -->
  <line x1="40" y1="572" x2="640" y2="572" stroke="#1a1a1f" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- Section 3: How bit spreading works -->
  <text x="340" y="598" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">How bit spreading works — step by step</text>

  <!-- Step 1 box -->
  <g>
    <rect x="40" y="614" width="600" height="44" rx="8" stroke-width="0.5" fill="#1e1b3a" stroke="#534AB7"/>
    <text x="340" y="630" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">Step 1 — shift right 16 bits: hash &gt;&gt;&gt; 16</text>
    <text x="340" y="648" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Moves high 16 bits → low 16 bits position</text>
  </g>

  <!-- Original hash row -->
  <text x="80" y="682" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">original hash:</text>
  <g>
    <rect x="200" y="668" width="200" height="28" rx="4" stroke-width="0.5" fill="#0d2e26" stroke="#0F6E56"/>
    <text x="300" y="686" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#2dd4aa">1010 1111  |  0000 0001</text>
  </g>
  <text x="412" y="682" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">← high bits  low bits →</text>

  <!-- Shifted result row -->
  <text x="80" y="716" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">&gt;&gt;&gt; 16 result:</text>
  <g>
    <rect x="200" y="702" width="200" height="28" rx="4" stroke-width="0.5" fill="#131316" stroke="#2a2a32"/>
    <text x="300" y="720" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">0000 0000  |  1010 1111</text>
  </g>
  <text x="412" y="716" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">high bits now in low</text>

  <!-- Step 2 box -->
  <g>
    <rect x="40" y="742" width="600" height="44" rx="8" stroke-width="0.5" fill="#1e1b3a" stroke="#534AB7"/>
    <text x="340" y="758" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">Step 2 — XOR with original: hash ^ (hash &gt;&gt;&gt; 16)</text>
    <text x="340" y="776" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Mixes high bits into low bits → more unique low bits</text>
  </g>

  <!-- Original row -->
  <text x="80" y="808" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">original:</text>
  <g>
    <rect x="160" y="794" width="180" height="28" rx="4" stroke-width="0.5" fill="#0d2e26" stroke="#0F6E56"/>
    <text x="250" y="812" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#2dd4aa">1010 1111  0000 0001</text>
  </g>

  <!-- XOR result row -->
  <text x="80" y="836" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">XOR result:</text>
  <g>
    <rect x="160" y="822" width="180" height="28" rx="4" stroke-width="0.5" fill="#2d1f06" stroke="#854F0B"/>
    <text x="250" y="840" text-anchor="middle" dominant-baseline="central" font-family="Inter,sans-serif" font-size="12" fill="#f59e0b">1010 1111  1010 1110</text>
  </g>

  <text x="355" y="808" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">Low bits now contain</text>
  <text x="355" y="824" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">influence of high bits</text>
  <text x="355" y="840" text-anchor="start" font-family="Inter,sans-serif" font-size="12" fill="#2dd4aa">→ better distribution</text>

</svg>