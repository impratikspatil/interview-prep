  <text x="200" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">LinkedList</text>
  <rect x="210" y="210" width="120" height="28" rx="4" fill="#131316" stroke="#36363f" stroke-width="0.5"/>
  <text x="270" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Vector (legacy)</text>

  <!-- Set implementations -->
  <line x1="340" y1="182" x2="340" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="290" y1="200" x2="390" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="290" y1="200" x2="290" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="200" x2="340" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="200" x2="390" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="248" y="210" width="84" height="28" rx="4" fill="#131316" stroke="#854F0B" stroke-width="0.5"/>
  <text x="290" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f59e0b">HashSet</text>
  <rect x="298" y="210" width="84" height="28" rx="4" fill="#131316" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#f59e0b">LinkedHashSet</text>
  <rect x="348" y="210" width="84" height="28" rx="4" fill="#131316" stroke="#854F0B" stroke-width="0.5"/>
  <text x="390" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f59e0b">TreeSet</text>

  <!-- Queue implementations -->
  <line x1="480" y1="182" x2="480" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="430" y1="200" x2="540" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="430" y1="200" x2="430" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="480" y1="200" x2="480" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="540" y1="200" x2="540" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="396" y="210" width="68" height="28" rx="4" fill="#131316" stroke="#993C1D" stroke-width="0.5"/>
  <text x="430" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">ArrayDeque</text>
  <rect x="447" y="210" width="66" height="28" rx="4" fill="#131316" stroke="#993C1D" stroke-width="0.5"/>
  <text x="480" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#f26450">PriorityQueue</text>
  <rect x="506" y="210" width="68" height="28" rx="4" fill="#131316" stroke="#36363f" stroke-width="0.5"/>
  <text x="540" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">LinkedList</text>

  <!-- Map (separate) -->
  <rect x="570" y="84" width="100" height="32" rx="6" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="620" y="104" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#7c6af7">Map</text>
  <text x="620" y="76" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5a5a6a">(separate)</text>

  <line x1="620" y1="116" x2="620" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="580" y1="200" x2="640" y2="200" stroke="#5a5a6a" stroke-width="1"/>
  <line x1="580" y1="200" x2="580" y2="210" stroke="#5a5a6a" stroke-width="1" marker-end="url(#arrow)"/>
