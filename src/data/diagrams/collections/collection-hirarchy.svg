  <rect x="60" y="210" width="130" height="28" rx="4" fill="#131316" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="125" y="228" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">ArrayList</text>
