<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>String Pool Architecture — Java Memory Layout</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">String Pool — Memory Layout</text>

  <!-- ===== STACK ===== -->
  <rect x="40" y="44" width="160" height="260" rx="8" fill="#131316" stroke="#2a2a32" stroke-width="0.5"/>
  <text x="120" y="64" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#7c6af7">STACK</text>

  <!-- Stack variables -->
  <rect x="56" y="76" width="128" height="36" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="98" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#c4c4d0">s1 = "Java"</text>

  <rect x="56" y="120" width="128" height="36" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#c4c4d0">s2 = "Java"</text>

  <rect x="56" y="164" width="128" height="36" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="120" y="186" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#c4c4d0">s3 = "Java"</text>

  <rect x="56" y="208" width="128" height="36" rx="4" fill="#2d1008" stroke="#993C1D" stroke-width="0.5"/>
  <text x="120" y="226" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">s4 = new String()</text>
  <text x="120" y="242" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#D85A30">points to heap</text>

  <rect x="56" y="264" width="128" height="28" rx="4" fill="#0d2e26" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="120" y="282" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">s5 = s4.intern()</text>

  <!-- ===== HEAP ===== -->
  <rect x="240" y="44" width="400" height="260" rx="8" fill="#131316" stroke="#2a2a32" stroke-width="0.5"/>
  <text x="440" y="64" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#f59e0b">HEAP</text>

  <!-- String Pool inside heap -->
  <rect x="256" y="76" width="240" height="150" rx="6" fill="#0d0d0f" stroke="#534AB7" stroke-width="0.8" stroke-dasharray="4 3"/>
  <text x="376" y="96" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#7c6af7">String Pool</text>

  <rect x="272" y="106" width="192" height="44" rx="6" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="368" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="500" fill="#c4c4d0">"Java"</text>
  <text x="368" y="142" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5a5a6a">shared by s1, s2, s3, s5</text>

  <rect x="272" y="162" width="90" height="36" rx="6" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="317" y="184" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">"Hello"</text>

  <rect x="374" y="162" width="90" height="36" rx="6" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="419" y="184" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#8a8a9a">"World"</text>

  <!-- Heap object (new String) -->
  <rect x="516" y="100" width="108" height="52" rx="6" fill="#2d1008" stroke="#993C1D" stroke-width="0.5"/>
  <text x="570" y="120" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#f26450">new String()</text>
  <text x="570" y="136" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#D85A30">"Java" on heap</text>
  <text x="570" y="149" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#5a5a6a">separate object</text>

  <!-- Arrows from stack to pool -->
  <line x1="184" y1="94" x2="272" y2="120" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="184" y1="138" x2="272" y2="123" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="184" y1="182" x2="272" y2="126" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow s4 -> heap object -->
  <line x1="184" y1="228" x2="516" y2="126" stroke="#993C1D" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Arrow s5 -> pool -->
  <line x1="184" y1="278" x2="272" y2="130" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- intern() label -->
  <text x="340" y="220" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">intern() →</text>

  <!-- Divider -->
  <line x1="40" y1="322" x2="640" y2="322" stroke="#1a1a1f" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ===== SECTION 2: String creation flow ===== -->
  <text x="340" y="348" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">String creation — two paths</text>

  <!-- Path 1: literal -->
  <rect x="40" y="364" width="280" height="130" rx="8" fill="#131316" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="384" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#7c6af7">String s = "Java"</text>

  <rect x="60" y="396" width="240" height="32" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="416" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8a8a9a">Check String Pool</text>

  <line x1="180" y1="428" x2="180" y2="444" stroke="#5a5a6a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="60" y="444" width="100" height="32" rx="4" fill="#0d2e26" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="464" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">Exists → reuse</text>

  <rect x="180" y="444" width="100" height="32" rx="4" fill="#2d1f06" stroke="#854F0B" stroke-width="0.5"/>
  <text x="230" y="464" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f59e0b">New → add pool</text>

  <!-- Path 2: new String() -->
  <rect x="360" y="364" width="280" height="130" rx="8" fill="#131316" stroke="#993C1D" stroke-width="0.5"/>
  <text x="500" y="384" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#f26450">new String("Java")</text>

  <rect x="380" y="396" width="240" height="32" rx="4" fill="#2d1008" stroke="#993C1D" stroke-width="0.5"/>
  <text x="500" y="416" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">Always creates heap object</text>

  <line x1="500" y1="428" x2="500" y2="444" stroke="#5a5a6a" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="380" y="444" width="110" height="32" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="435" y="464" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8a8a9a">Pool object</text>

  <rect x="506" y="444" width="114" height="32" rx="4" fill="#2d1008" stroke="#993C1D" stroke-width="0.5"/>
  <text x="563" y="464" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">Heap object ←s</text>

  <!-- Divider -->
  <line x1="40" y1="514" x2="640" y2="514" stroke="#1a1a1f" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ===== SECTION 3: == vs equals() ===== -->
  <text x="340" y="540" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">== vs equals()</text>

  <!-- Case 1 -->
  <rect x="40" y="556" width="280" height="110" rx="8" fill="#131316" stroke="#2a2a32" stroke-width="0.5"/>
  <text x="180" y="576" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#c4c4d0">Both literals</text>
  <rect x="56" y="588" width="248" height="28" rx="4" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="180" y="606" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8a8a9a">String a = "Java"; String b = "Java";</text>
  <text x="180" y="632" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">a == b</text>
  <rect x="100" y="644" width="160" height="14" rx="3" fill="#0d2e26" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="655" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#2dd4aa">true — same pool object</text>

  <!-- Case 2 -->
  <rect x="360" y="556" width="280" height="110" rx="8" fill="#131316" stroke="#2a2a32" stroke-width="0.5"/>
  <text x="500" y="576" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="500" fill="#c4c4d0">new vs literal</text>
  <rect x="376" y="588" width="248" height="28" rx="4" fill="#2d1008" stroke="#993C1D" stroke-width="0.5"/>
  <text x="500" y="606" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">String a = new String("Java"); b = "Java"</text>
  <text x="500" y="632" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#5a5a6a">a == b → false | a.equals(b) → true</text>
  <rect x="380" y="644" width="240" height="14" rx="3" fill="#2d1f06" stroke="#854F0B" stroke-width="0.5"/>
  <text x="500" y="655" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#f59e0b">different objects, same content</text>

  <!-- Rule box -->
  <rect x="40" y="682" width="600" height="36" rx="8" fill="#1e1b3a" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="698" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#7c6af7">Rule: always use equals() for String comparison, never ==</text>
  <text x="340" y="712" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8a8a9a">== compares addresses | equals() compares characters</text>

  <!-- Divider -->
  <line x1="40" y1="736" x2="640" y2="736" stroke="#1a1a1f" stroke-width="0.5" stroke-dasharray="4 4"/>

  <!-- ===== SECTION 4: String vs StringBuilder vs StringBuffer ===== -->
  <text x="340" y="760" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="500" fill="#c4c4d0">String vs StringBuilder vs StringBuffer</text>

  <!-- String col -->
  <rect x="40" y="776" width="184" height="120" rx="8" fill="#131316" stroke="#534AB7" stroke-width="0.5"/>
  <text x="132" y="796" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#7c6af7">String</text>
  <text x="132" y="816" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Immutable</text>
  <text x="132" y="834" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">Thread Safe ✓</text>
  <text x="132" y="852" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">New obj on change</text>
  <text x="132" y="870" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">equals() overridden</text>
  <text x="132" y="888" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">HashMap key safe</text>

  <!-- StringBuilder col -->
  <rect x="248" y="776" width="184" height="120" rx="8" fill="#131316" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="796" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#2dd4aa">StringBuilder</text>
  <text x="340" y="816" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Mutable</text>
  <text x="340" y="834" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">Not Thread Safe ✗</text>
  <text x="340" y="852" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">Fastest ✓</text>
  <text x="340" y="870" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">No equals() override</text>
  <text x="340" y="888" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Use in loops</text>

  <!-- StringBuffer col -->
  <rect x="456" y="776" width="184" height="120" rx="8" fill="#131316" stroke="#854F0B" stroke-width="0.5"/>
  <text x="548" y="796" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#f59e0b">StringBuffer</text>
  <text x="548" y="816" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Mutable</text>
  <text x="548" y="834" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#2dd4aa">Thread Safe ✓</text>
  <text x="548" y="852" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">Slower (sync)</text>
  <text x="548" y="870" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#f26450">No equals() override</text>
  <text x="548" y="888" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#5a5a6a">Rarely needed</text>

</svg>